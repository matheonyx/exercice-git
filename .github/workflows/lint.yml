name: Action Mes Dates
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Dossier AVANT checkout (vide)
        run: ls -R

      - name: 2. Récupération du code (checkout)
        uses: actions/checkout@v4

      - name: 3. Dossier APRÈS checkout (plein)
        run: ls -R