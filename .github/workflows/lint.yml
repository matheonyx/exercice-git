name: Action Mes Dates
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 1. Installation de Composer
        run: composer install

      - name: 2. Vérification PHPCS (via Composer)
        run: ./vendor/bin/phpcs src/MesDates.php